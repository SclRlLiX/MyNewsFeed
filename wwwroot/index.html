<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MyNewsFeed</title>
    <base href="/" />
    <link rel="preload" id="webassembly" />
    <!--<link rel="stylesheet" href="lib/bootstrap/dist/css/bootstrap.min.css" />-->
    <link rel="stylesheet" href="css/app.css" />
    <link rel="icon" type="image/png" href="favicon.png" />
    <link href="MyNewsFeed.styles.css" rel="stylesheet" />
    <link href="manifest.webmanifest" rel="manifest" />
    <link rel="apple-touch-icon" sizes="512x512" href="icon-512.png" />
    <link rel="apple-touch-icon" sizes="192x192" href="icon-192.png" />
    <script type="importmap"></script>

    <!--Fonts-->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&family=Fraunces:ital,opsz,wght@0,9..144,100..900;1,9..144,100..900&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Lato:ital,wght@0,100;0,300;0,400;0,700;0,900;1,100;1,300;1,400;1,700;1,900&family=Lora:ital,wght@0,400..700;1,400..700&family=Playfair+Display:ital,wght@0,400..900;1,400..900&family=Source+Sans+3:ital,wght@0,200..900;1,200..900&display=swap" rel="stylesheet">

    <!--Tailwind CSS-->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        'headline': ['"Lato"', 'serif'],
                        'headline-text-only': ['"Playfair Display"', 'serif'],
                        'description': ['"DM Sans"', 'sans-serif'],
                        'tag': ['"Inter"', 'sans-serif']
                    },
                    fontSize: {
                        'headline': ['1.35rem', { lineHeight: '1.25' }],
                        'headline-small': ['1.15rem', { lineHeight: '1.25', letterSpacing: '-0.02em' }],
                        'description': ['0.75rem', { lineHeight: '1.25', letterSpacing: '-0.01em' }], 
                        'tag': '10px'
                    }
                },
            },
        }
    </script>


</head>

<body class="w-full overflow-x-hidden bg-black mx-auto max-w-lg px-4 text-white">
    <div id="app">
        <div class="loading-container">
            <div class="loading-logo">MY NEWS FEED</div>
            <div class="loading-bar-bg">
                <div class="loading-bar-fill"></div>
            </div>
        </div>
    </div>

    <div id="blazor-error-ui">
        An unhandled error has occurred.
        <a href="." class="reload">Reload</a>
        <span class="dismiss">🗙</span>
    </div>
    <script src="_framework/blazor.webassembly#[.{fingerprint}].js"></script>
    <script>navigator.serviceWorker.register('service-worker.js', { updateViaCache: 'none' });</script>

    <script>
        window.observerInterop = {
            initialize: function (dotNetHelper, element) {
                let observer = new IntersectionObserver((entries) => {
                    if (entries[0].isIntersecting) {
                        dotNetHelper.invokeMethodAsync('TriggerLoadMore');
                    }
                });
                observer.observe(element);
            }
        };
    </script>
</body>

</html>
